name: gama_app
description: "Gama Physics Educational Platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  provider: ^6.1.2
  webview_flutter: ^4.10.0
  crypto: ^3.0.6
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  youtube_player_iframe: ^5.1.1
  youtube_player_flutter: ^9.1.3
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.2.2
  excel: ^4.0.6
  path_provider: ^2.1.4
  share_plus: ^10.1.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/GAMA.png
  fonts:
    - family: figtree
      fonts:
        - asset: assets/fonts/Figtree-Bold.ttf
        - asset: assets/fonts/Figtree-Medium.ttf
        - asset: assets/fonts/Figtree-Regular.ttf
        - asset: assets/fonts/Figtree-SemiBold.ttf
    - family: poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
    - family: gurajada
      fonts:
        - asset: assets/fonts/Gurajada-Regular.ttf
    - family: roboto
      fonts:
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Light.ttf
        - asset: assets/fonts/Roboto-SemiBold.ttf

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
        - asset: assets/fonts/Cairo-SemiBold.ttf
        - asset: assets/fonts/Cairo-Bold.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/GAMA.png"
  min_sdk_android: 21
